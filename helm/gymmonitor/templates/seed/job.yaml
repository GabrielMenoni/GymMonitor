apiVersion: batch/v1
kind: Job
metadata:
  name: gymmonitor-seed
  labels:
    {{- include "gymmonitor.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-api-gateway
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z api-gateway 8080; do echo "aguardando api-gateway..."; sleep 2; done']
      containers:
        - name: seed
          image: {{ .Values.images.seed }}
          env:
            - name: GATEWAY_URL
              value: http://api-gateway:8080/api
