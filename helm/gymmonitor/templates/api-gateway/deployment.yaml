apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    {{- include "gymmonitor.labels" . | nindent 4 }}
    app: api-gateway
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      initContainers:
        - name: wait-user-service
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z user-service 8082; do echo "aguardando user-service..."; sleep 2; done']
        - name: wait-access-control
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z access-control 8081; do echo "aguardando access-control..."; sleep 2; done']
        - name: wait-presence-service
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z presence-service 8083; do echo "aguardando presence-service..."; sleep 2; done']
      containers:
        - name: api-gateway
          image: {{ .Values.images.apiGateway }}
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
