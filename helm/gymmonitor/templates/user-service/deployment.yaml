apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    {{- include "gymmonitor.labels" . | nindent 4 }}
    app: user-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
        - name: wait-postgres-users
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-users 5432; do echo "aguardando postgres-users..."; sleep 2; done']
      containers:
        - name: user-service
          image: {{ .Values.images.userService }}
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres-users:5432/gymmonitor_users
            - name: SPRING_DATASOURCE_USERNAME
              value: gymmonitor
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gymmonitor-secrets
                  key: postgres-password
          ports:
            - containerPort: 8082
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
