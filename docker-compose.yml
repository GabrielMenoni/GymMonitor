networks:
  gymmonitor-net:
    driver: bridge

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: gymmonitor-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - gymmonitor-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gymmonitor-redis
    volumes:
      - redis_data:/data
    networks:
      - gymmonitor-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  user-service:
    build:
      context: ./backend/gymmonitor/services/UserService
      dockerfile: Dockerfile
    container_name: gymmonitor-user-service
    networks:
      - gymmonitor-net
    restart: unless-stopped

  access-control:
    build:
      context: ./backend/gymmonitor/services/AccessControl
      dockerfile: Dockerfile
    container_name: gymmonitor-access-control
    networks:
      - gymmonitor-net
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  presence-service:
    build:
      context: ./backend/gymmonitor/services/PresenceService
      dockerfile: Dockerfile
    container_name: gymmonitor-presence-service
    networks:
      - gymmonitor-net
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: ./backend/gymmonitor/services/ApiGateway
      dockerfile: Dockerfile
    container_name: gymmonitor-api-gateway
    ports:
      - "8080:8080"
    networks:
      - gymmonitor-net
    depends_on:
      - user-service
      - access-control
      - presence-service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gymmonitor-frontend
    ports:
      - "4200:4200"
    networks:
      - gymmonitor-net
    environment:
      PORT: 4200
    restart: unless-stopped

volumes:
  rabbitmq_data:
  redis_data:
