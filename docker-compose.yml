networks:
  gymmonitor-net:
    driver: bridge

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: gymmonitor-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - gymmonitor-net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gymmonitor-redis
    volumes:
      - redis_data:/data
    networks:
      - gymmonitor-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  postgres-users:
    image: postgres:16-alpine
    container_name: gymmonitor-postgres-users
    networks:
      - gymmonitor-net
    environment:
      POSTGRES_DB: gymmonitor_users
      POSTGRES_USER: gymmonitor
      POSTGRES_PASSWORD: gymmonitor_pass
    volumes:
      - postgres_users_data:/var/lib/postgresql/data
      - ./docker/postgres/init-users.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gymmonitor -d gymmonitor_users" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  postgres-access:
    image: postgres:16-alpine
    container_name: gymmonitor-postgres-access
    networks:
      - gymmonitor-net
    environment:
      POSTGRES_DB: gymmonitor_access
      POSTGRES_USER: gymmonitor
      POSTGRES_PASSWORD: gymmonitor_pass
    volumes:
      - postgres_access_data:/var/lib/postgresql/data
      - ./docker/postgres/init-access.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U gymmonitor -d gymmonitor_access" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  user-service:
    image: gmenoni/gymmonitor-user-service:latest
    container_name: gymmonitor-user-service
    networks:
      - gymmonitor-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-users:5432/gymmonitor_users
      SPRING_DATASOURCE_USERNAME: gymmonitor
      SPRING_DATASOURCE_PASSWORD: gymmonitor_pass
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      postgres-users:
        condition: service_healthy
    restart: unless-stopped

  access-control:
    image: gmenoni/gymmonitor-access-control:latest
    container_name: gymmonitor-access-control
    networks:
      - gymmonitor-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-access:5432/gymmonitor_access
      SPRING_DATASOURCE_USERNAME: gymmonitor
      SPRING_DATASOURCE_PASSWORD: gymmonitor_pass
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      postgres-access:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  presence-service:
    image: gmenoni/gymmonitor-presence-service:latest
    container_name: gymmonitor-presence-service
    networks:
      - gymmonitor-net
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    image: gmenoni/gymmonitor-api-gateway:latest
    container_name: gymmonitor-api-gateway
    ports:
      - "8080:8080"
    networks:
      - gymmonitor-net
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    depends_on:
      user-service:
        condition: service_healthy
      access-control:
        condition: service_healthy
      presence-service:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: gmenoni/gymmonitor-frontend:latest
    container_name: gymmonitor-frontend
    ports:
      - "4200:4200"
    networks:
      - gymmonitor-net
    environment:
      PORT: 4200
    restart: unless-stopped

volumes:
  rabbitmq_data:
  redis_data:
  postgres_users_data:
  postgres_access_data:
