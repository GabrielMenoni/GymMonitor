server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://user-service:8082
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=1

            - id: access-control
              uri: http://access-control:8081
              predicates:
                - Path=/api/access/**
              filters:
                - StripPrefix=1

            - id: presence-service-ws
              uri: http://presence-service:8083
              predicates:
                - Path=/api/presence/ws/**
              filters:
                - RewritePath=/api/presence/ws(?<segment>.*), /ws${segment}

            - id: presence-service
              uri: http://presence-service:8083
              predicates:
                - Path=/api/presence/**
              filters:
                - StripPrefix=1

security:
  jwt:
    secret: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=

management:
  endpoints:
    web:
      exposure:
        include: health
