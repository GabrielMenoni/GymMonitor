spring.application.name=presence-service
server.port=8083

# RabbitMQ (configure via SPRING_RABBITMQ_HOST and SPRING_RABBITMQ_PORT env vars)
spring.rabbitmq.port=5672

# Redis (configure via SPRING_DATA_REDIS_HOST and SPRING_DATA_REDIS_PORT env vars)
spring.data.redis.port=6379

# JWT (mesmo secret do UserService e AccessControl)
security.jwt.secret=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=

# TTL de sessão (alterar aqui para ajustar limpeza automática)
presence.session.ttl-hours=6
