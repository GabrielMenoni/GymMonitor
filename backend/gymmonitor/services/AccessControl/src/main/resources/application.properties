spring.application.name=access-control
server.port=8081

security.jwt.secret=MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=

# PostgreSQL — valores padrão sobrescritos por env vars no Docker
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gymmonitor_access}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gymmonitor}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:gymmonitor_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# RabbitMQ
spring.rabbitmq.port=5672
